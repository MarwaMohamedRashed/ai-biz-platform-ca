# Auto-deploy Next.js frontend to Vercel on every push to main
# Vercel has a GitHub integration that handles this automatically once connected.
# This workflow adds a test step before the deploy.

name: Deploy frontend to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'         # Only run when frontend code changes

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/web
          npm ci

      - name: Type check
        run: |
          cd apps/web
          npm run type-check
        continue-on-error: true

      - name: Build
        run: |
          cd apps/web
          npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      # Vercel auto-deploys from GitHub once you connect the repo in the Vercel dashboard.
      # No additional deploy step needed here — the build above validates the code.
      - name: Deploy complete
        run: echo "Build passed — Vercel will auto-deploy from the GitHub integration"
